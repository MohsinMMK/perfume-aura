# Path B — CI builds Hostinger Path Z standalone zip (autonomous pack).
# Optional deploy: set repo secret HOSTINGER_API_TOKEN to push zip via official API.
#
# Marketing Path M stays classic Git (separate). This workflow is ops-only.
name: ops-pack
# CI uses Node 22 (pnpm 11). Hostinger runtime stays Node 20 for the prebuilt zip.

on:
  push:
    branches: [main]
    paths:
      - "apps/ops/**"
      - "packages/**"
      - "scripts/pack-ops-standalone.sh"
      - "scripts/deploy-ops-hostinger.sh"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ops-pack.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Also deploy zip to Hostinger (needs HOSTINGER_API_TOKEN secret)"
        type: boolean
        default: true

concurrency:
  group: ops-pack-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  pack:
    name: pack standalone zip
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Build-time only — never production secrets. Runtime secret stays hPanel.
      BETTER_AUTH_URL: https://app.perfumeaura.com
      NEXT_PUBLIC_BETTER_AUTH_URL: https://app.perfumeaura.com
      # Satisfy modules that read env at import during next build
      BETTER_AUTH_SECRET: ci-build-only-not-for-runtime-use-32b
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Pack ops standalone (Path Z)
        run: pnpm ops:pack

      - name: Assert zip under Hostinger 50MB API limit
        run: |
          set -euo pipefail
          ZIP="$(ls -1t dist/perfume-aura-standalone_*.zip | head -1)"
          BYTES="$(wc -c < "$ZIP" | tr -d ' ')"
          echo "zip=$ZIP bytes=$BYTES"
          test "$BYTES" -gt 10000000
          test "$BYTES" -le $((50 * 1024 * 1024))
          echo "ZIP_PATH=$ZIP" >> "$GITHUB_ENV"
          echo "ZIP_NAME=$(basename "$ZIP")" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ops-standalone-zip
          path: dist/perfume-aura-standalone_*.zip
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: deploy to Hostinger (optional)
    needs: pack
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Manual dispatch can disable; push always attempts when token secret exists
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    env:
      HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
      # Optional overrides; script defaults username/domain if empty
      HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
      HOSTINGER_OPS_DOMAIN: ${{ secrets.HOSTINGER_OPS_DOMAIN }}
    steps:
      - name: Checkout (deploy script only)
        uses: actions/checkout@v4

      - name: Skip if no API token
        id: gate
        run: |
          if [ -z "${HOSTINGER_API_TOKEN}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "HOSTINGER_API_TOKEN secret not set — artifact only (download from Actions, upload in hPanel)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download pack artifact
        if: steps.gate.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: ops-standalone-zip
          path: dist

      - name: Deploy zip via Hostinger from-archive API
        if: steps.gate.outputs.skip == 'false'
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-ops-hostinger.sh
          OPS_ZIP="$(ls -1t dist/perfume-aura-standalone_*.zip | head -1)"
          export OPS_ZIP
          bash scripts/deploy-ops-hostinger.sh
